name: Build Tissue Desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
    paths:
      - 'electron/**'
      - 'app/**'
      - 'frontend/**'
      - 'requirements.txt'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/build-desktop.yml'

jobs:
  build:
    # DESKTOP-MODIFIED: Gitea 侧可用 runner 标签为 ubuntu-latest / ubuntu-22.04 / ubuntu-20.04，
    # 为兼容大包构建需求，统一使用 ubuntu-latest。Ubuntu runner 仅可构建 Linux 安装包。
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -r requirements.txt pyinstaller

      - name: Install Node dependencies
        run: npm install

      - name: Build desktop artifacts
        shell: bash
        run: |
          npm run build:frontend
          npm run build:electron
          npm run build:backend
          npx electron-builder --config electron/builder.config.cjs --linux

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tissue-desktop-linux
          path: release/
          if-no-files-found: error
