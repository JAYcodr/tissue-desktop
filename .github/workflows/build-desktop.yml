name: Build Tissue Desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
    paths:
      - 'electron/**'
      - 'app/**'
      - 'frontend/**'
      - 'requirements.txt'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/build-desktop.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          ${{ matrix.os == 'windows-latest' && '.venv\\Scripts\\pip' || '.venv/bin/pip' }} install -r requirements.txt pyinstaller

      - name: Install Node dependencies
        run: npm install

      - name: Build desktop artifacts
        run: npm run build

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tissue-desktop-${{ matrix.os }}
          path: release/
          if-no-files-found: error
